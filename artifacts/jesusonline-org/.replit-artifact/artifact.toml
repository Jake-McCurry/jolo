kind = "web"
previewPath = "/"
title = "JesusOnline.org"
version = "1.0.0"
id = "artifacts/jesusonline-org"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26163

[services.development]
run = "pnpm --filter @workspace/jesusonline-org run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jesusonline-org", "run", "build" ]
publicDir = "artifacts/jesusonline-org/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26163"
BASE_PATH = "/"
